media:
  input: assets
  output: /
content:
  - name: pages
    label: Pages
    type: collection
    path: pages
    fields:
      - name: title
        type: string
      - name: body
        type: rich-text
  - name: site
    label: Site settings
    type: file
    path: cecil.yml
    fields:
      - name: title
        type: string
      - name: description
        type: text